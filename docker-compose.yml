services:
  directemby:
    build: .
    container_name: directemby
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: directemby-cloudflared
    restart: unless-stopped
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - directemby
